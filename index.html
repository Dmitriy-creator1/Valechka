<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VALYA ONLINE: GLOBAL RANKING</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- СТИЛИ (Дизайн) --- */
        :root { --glass: rgba(255, 255, 255, 0.95); --accent: #6c5ce7; }
        body {
            font-family: 'Nunito', sans-serif; margin: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(-45deg, #74b9ff, #a29bfe, #fab1a0, #ff7675);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .game-card {
            background: var(--glass); border-radius: 40px; padding: 20px;
            width: 90%; max-width: 450px; border: 4px solid #fff;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative;
        }

        /* АВАТАР */
        .avatar-container { width: 180px; height: 180px; margin: 0 auto 15px; position: relative; }
        .avatar-circle {
            width: 100%; height: 100%; border-radius: 50%; border: 6px solid #fff;
            background: #dfe6e9; overflow: hidden; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .avatar-img { width: 100%; height: 100%; background-size: cover; background-position: center; display: none; }
        .fallback-emoji { font-size: 80px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* ИНТЕРФЕЙС */
        .top-bar { display: flex; justify-content: space-between; font-weight: 900; margin-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .stat-item { background: rgba(255,255,255,0.7); padding: 5px; border-radius: 10px; }
        .bar-bg { height: 8px; background: #ddd; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .bar-fill { height: 100%; width: 100%; transition: 0.3s; }
        
        /* КНОПКИ */
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn {
            border: none; background: #fff; padding: 10px; border-radius: 15px;
            font-weight: 900; font-size: 11px; cursor: pointer; box-shadow: 0 4px 0 #b2bec3;
            border: 1px solid #ccc; transition: 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn i { display: block; font-size: 22px; margin-bottom: 3px; }
        .btn-menu { width: 100%; background: #6c5ce7; color: white; margin-top: 10px; padding: 12px; font-size: 14px; box-shadow: 0 4px 0 #4834d4; }
        
        /* МОДАЛЬНЫЕ ОКНА */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100; display: none;
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-box {
            background: white; width: 85%; max-width: 350px; padding: 25px;
            border-radius: 30px; text-align: center; border: 5px solid #6c5ce7;
            max-height: 80vh; overflow-y: auto;
        }
        input { width: 80%; padding: 10px; font-size: 18px; text-align: center; border-radius: 10px; border: 2px solid #ccc; margin: 15px 0; }
        
        /* Таблица лидеров */
        .leaderboard-row {
            display: flex; justify-content: space-between; padding: 10px;
            border-bottom: 1px solid #eee; font-weight: bold; font-size: 14px;
        }
        .leaderboard-row:nth-child(1) { background: #ffeaa7; color: #d35400; border-radius: 10px; } /* Золото */
        .loading { color: #888; font-style: italic; }
        
        .bubble { position: absolute; top: -60px; left: 50%; transform: translateX(-50%); background: white; padding: 10px; border-radius: 15px; opacity: 0; transition: 0.3s; font-weight: bold; white-space: nowrap; pointer-events: none; }
        .bubble.show { opacity: 1; }
    </style>
</head>
<body>

<div class="modal" id="login-screen" style="display: flex;">
    <div class="modal-box">
        <h2>🌍 МИРОВОЙ РЕЙТИНГ</h2>
        <p>Введи имя, чтобы тебя видели другие игроки:</p>
        <input type="text" id="nickname-input" placeholder="Твой никнейм" maxlength="15">
        <button class="btn btn-menu" onclick="startGame()">ИГРАТЬ</button>
    </div>
</div>

<div class="modal" id="leaderboard-screen">
    <div class="modal-box">
        <h2>🏆 ТОП ИГРОКОВ МИРА</h2>
        <div id="leaderboard-list" style="text-align: left;">
            <p class="loading">Загрузка данных из облака...</p>
        </div>
        <button class="btn btn-menu" style="background:#ff7675; margin-top: 15px;" onclick="closeLeaderboard()">ЗАКРЫТЬ</button>
    </div>
</div>

<div class="game-card">
    <div class="top-bar">
        <div>🪙 <span id="ui-money">0</span></div>
        <div>LVL <span id="ui-lvl">1</span></div>
    </div>

    <div class="avatar-container">
        <div class="bubble" id="bubble">...</div>
        <div class="avatar-circle">
            <div class="avatar-img" id="valya-face"></div>
            <div class="fallback-emoji" id="sticker">👶</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-item"><div class="bar-bg"><div id="bar-hunger" class="bar-fill" style="background:#ff9ff3;width:100%"></div></div></div>
        <div class="stat-item"><div class="bar-bg"><div id="bar-energy" class="bar-fill" style="background:#54a0ff;width:100%"></div></div></div>
        <div class="stat-item"><div class="bar-bg"><div id="bar-happy" class="bar-fill" style="background:#feca57;width:100%"></div></div></div>
        <div class="stat-item"><div class="bar-bg"><div id="bar-health" class="bar-fill" style="background:#1dd1a1;width:100%"></div></div></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="Game.act('feed')"><i>🍼</i>ЕСТЬ</button>
        <button class="btn" onclick="Game.act('play')"><i>🧸</i>ИГРАТЬ</button>
        <button class="btn" onclick="Game.act('sleep')"><i>💤</i>СПАТЬ</button>
        <button class="btn" onclick="Game.act('heal')"><i>💊</i>ЛЕЧИТЬ</button>
        <button class="btn" onclick="Game.act('wash')"><i>🧼</i>МЫТЬ</button>
        <button class="btn" onclick="Game.act('hug')"><i>🤗</i>ЛЮБИТЬ</button>
    </div>

    <button class="btn btn-menu" onclick="openLeaderboard()">🏆 ОТКРЫТЬ РЕЙТИНГ</button>
</div>

<script type="module">
    // ------------------------------------------------------------------
    // 1. НАСТРОЙКА FIREBASE (Вставь свои данные ниже)
    // ------------------------------------------------------------------
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    // !!! ВНИМАНИЕ: ЗАМЕНИ ЭТОТ БЛОК НА СВОЙ ИЗ КОНСОЛИ FIREBASE !!!
    const firebaseConfig = {
        apiKey : "AIzaSyASFWbFkCGVzD4tkoVmk6TxVD9eGexFs6E" , 
  	authDomain : "valya-game.firebaseapp.com" , 
  	projectId : "valya-game" , 
  	storageBucket : "valya-game.firebasestorage.app" , 
  	messagingSenderId : "317004790952" , 
  	appId : "1:317004790952:web:eb5e77188d2ccaaaf2569d" , 
  	measurementId : "G-XYKFL631FX" 
    };
    // ------------------------------------------------------------------

    // Инициализация базы
    let db;
    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        console.log("База данных подключена!");
    } catch (e) {
        console.error("Ошибка подключения к базе. Проверь конфиг!", e);
    }

    // Глобальные функции для кнопок (так как type="module" изолирует код)
    window.startGame = () => {
        const name = document.getElementById('nickname-input').value.trim();
        if(!name) return alert("Введи имя!");
        localStorage.setItem('valya_user', name);
        document.getElementById('login-screen').style.display = 'none';
        Game.init();
    };

    window.openLeaderboard = async () => {
        document.getElementById('leaderboard-screen').style.display = 'flex';
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = '<p class="loading">Загрузка рейтинга мира...</p>';

        if(!db) {
            list.innerHTML = '<p style="color:red">Ошибка базы данных</p>';
            return;
        }

        try {
            // Запрос в базу: Дай мне коллекцию "scores", отсортируй по lvl (убывание), дай топ 10
            const q = query(collection(db, "scores"), orderBy("lvl", "desc"), limit(10));
            const querySnapshot = await getDocs(q);
            
            let html = "";
            let rank = 1;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                html += `
                    <div class="leaderboard-row">
                        <span>#${rank++} ${data.name}</span>
                        <span>Ур. ${data.lvl} | ${data.money}🪙</span>
                    </div>
                `;
            });

            if(html === "") html = "<p>Пока никто не играл. Будь первым!</p>";
            list.innerHTML = html;

        } catch (error) {
            console.error(error);
            list.innerHTML = "<p>Не удалось загрузить рейтинг. Проверь интернет.</p>";
        }
    };

    window.closeLeaderboard = () => {
        document.getElementById('leaderboard-screen').style.display = 'none';
    };

    // ------------------------------------------------------------------
    // 2. ИГРОВОЙ ДВИЖОК
    // ------------------------------------------------------------------
    window.Game = {
        stats: { hunger: 100, energy: 100, happy: 100, health: 100 },
        lvl: 1, money: 0, dead: false,
        
        init() {
            // Проверка сохраненного имени
            const savedName = localStorage.getItem('valya_user');
            if(savedName) {
                document.getElementById('nickname-input').value = savedName;
                document.getElementById('login-screen').style.display = 'none';
            } else {
                return; // Ждем ввода
            }

            this.preloadImages();
            setInterval(() => this.tick(), 500); // Игровой цикл
            this.render();
        },

        preloadImages() {
            // Предзагрузка фото, чтобы не было стикеров
            ['happy','sad','cry','sleep','dead'].forEach(mood => {
                const img = new Image();
                img.src = `valya_${mood}.png`;
            });
        },

        act(action) {
            if(this.dead) return;
            const s = this.stats;
            
            if(action === 'feed') { s.hunger += 20; this.say("Ням-ням"); }
            if(action === 'play') { s.happy += 15; s.energy -= 10; this.say("Весело!"); }
            if(action === 'sleep') { s.energy += 100; s.hunger -= 20; this.say("Хррр..."); }
            if(action === 'heal') { 
                if(this.money >= 10) { this.money -= 10; s.health += 50; this.say("Спасибо!"); }
                else this.say("Нет денег!");
            }
            if(action === 'wash') { s.happy += 10; this.say("Чисто!"); }
            if(action === 'hug') { s.happy += 5; this.say("❤️"); }

            this.checkBounds();
            this.render();
        },

        tick() {
            if(this.dead) return;
            const s = this.stats;
            s.hunger -= 1; s.energy -= 0.5; s.happy -= 0.5;
            if(s.hunger <= 0 || s.happy <= 0) s.health -= 1;
            
            // Левел ап
            if(Math.random() < 0.02) {
                this.lvl++; this.money += 20;
                this.say("LEVEL UP!");
            }

            if(s.health <= 0) this.gameOver();
            this.render();
        },

        checkBounds() {
            for(let key in this.stats) this.stats[key] = Math.max(0, Math.min(100, this.stats[key]));
        },

        render() {
            document.getElementById('bar-hunger').style.width = this.stats.hunger + '%';
            document.getElementById('bar-energy').style.width = this.stats.energy + '%';
            document.getElementById('bar-happy').style.width = this.stats.happy + '%';
            document.getElementById('bar-health').style.width = this.stats.health + '%';
            
            document.getElementById('ui-lvl').innerText = this.lvl;
            document.getElementById('ui-money').innerText = this.money;

            // Логика фото (с фиксом)
            let mood = 'happy';
            let emoji = '👶';
            if(this.dead) { mood = 'dead'; emoji = '☠️'; }
            else if(this.stats.health < 40) { mood = 'cry'; emoji = '😭'; }
            else if(this.stats.happy < 40) { mood = 'sad'; emoji = '🥺'; }
            
            const imgDiv = document.getElementById('valya-face');
            const stickerDiv = document.getElementById('sticker');
            
            // Пытаемся показать картинку
            const img = new Image();
            img.src = `valya_${mood}.png`;
            img.onload = () => {
                imgDiv.style.backgroundImage = `url(valya_${mood}.png)`;
                imgDiv.style.display = 'block';
                stickerDiv.style.display = 'none';
            };
            img.onerror = () => {
                imgDiv.style.display = 'none';
                stickerDiv.style.display = 'block';
                stickerDiv.innerText = emoji;
            };
        },

        async gameOver() {
            this.dead = true;
            this.render();
            const name = localStorage.getItem('valya_user');
            
            if(confirm(`ВАЛЕЧКА ПОГИБЛА!\nВаш уровень: ${this.lvl}\nСохранить в мировой рейтинг?`)) {
                if(db) {
                    try {
                        // ОТПРАВКА ДАННЫХ В ОБЛАКО
                        await addDoc(collection(db, "scores"), {
                            name: name,
                            lvl: this.lvl,
                            money: this.money,
                            date: new Date().toISOString()
                        });
                        alert("Результат сохранен в базе мира!");
                    } catch (e) {
                        alert("Ошибка сохранения: " + e.message);
                    }
                }
            }
            location.reload();
        },

        say(text) {
            const b = document.getElementById('bubble');
            b.innerText = text;
            b.classList.add('show');
            setTimeout(() => b.classList.remove('show'), 2000);
        }
    };
    
    // Пытаемся запустить авто-вход, если имя уже есть
    if(localStorage.getItem('valya_user')) {
        Game.init();
    }
</script>

</body>
</html>
